  let UNITS = [], MEMBERS = [], ROTATION = null, PLATOONS = [], SQUADS = [];

  function renderLogin(errMsg) {
    app.innerHTML = `
      <div class="center"><div class="card">
        <h1>سجلّ الدوام</h1>
        <p>سجّل الدخول بحسابك للمتابعة</p>

        <button id="loginBtn" style="width:100%">دخول</button>
        ${errMsg ? `<div class="err">${errMsg}</div>` : ""}
      </div></div>
    `;
    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      btn.disabled = true; btn.textContent = "...";
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { renderLogin(error.message); return; }
      await bootApp();
    };
  }

  async function ensureDefaultUnits() {
    const { data } = await sb.from("units").select("*").order("name");
    if (data && data.length === 0) {
      const { data: inserted } = await sb.from("units").insert([{ name:"السرية الأولى" }, { name:"السرية الثانية" }]).select();
      return inserted || [];
    }
    return data || [];
  }
  async function loadMembers(unitIds) {
    const { data } = await sb.from("members").select("*").in("unit_id", unitIds).order("created_at");
    return data || [];
  }
  async function getRotation(units) {
    const { data } = await sb.from("settings").select("*").eq("key","rotation").maybeSingle();
    if (data) return data.value;
    const value = { date: todayISO(), onDutyUnit: units[0].id };
    await sb.from("settings").insert({ key:"rotation", value });
    return value;
  }
  async function loadPlatoons() {
    const { data } = await sb.from("platoons").select("*").order("name");
    return data || [];
  }
  async function loadSquads() {
    const { data } = await sb.from("squads").select("*").order("name");
    return data || [];
  }
  async function refreshHierarchy() {
    MEMBERS = await loadMembers(UNITS.map(u => u.id));
    PLATOONS = await loadPlatoons();
    SQUADS = await loadSquads();
  }
  function getOnDutyUnitId(units, rotation, dateISO) {
    const anchor = new Date(rotation.date+"T00:00:00");
    const target = new Date(dateISO+"T00:00:00");
    const diffDays = Math.round((target - anchor) / 86400000);
    const weekIndex = Math.floor(diffDays / 7);
    const other = units.find(u => u.id !== rotation.onDutyUnit)?.id || rotation.onDutyUnit;
    const parity = ((weekIndex % 2) + 2) % 2;
    return parity === 0 ? rotation.onDutyUnit : other;
  }
  function getWeekStart(dateISO, rotation) {
    const anchor = new Date(rotation.date+"T00:00:00");
    const target = new Date(dateISO+"T00:00:00");
    const diffDays = Math.round((target - anchor) / 86400000);
    const weekIndex = Math.floor(diffDays / 7);
    const start = new Date(anchor.getTime() + weekIndex * 7 * 86400000);
    return `${start.getFullYear()}-${pad(start.getMonth()+1)}-${pad(start.getDate())}`;
  }
  async function loadShiftPlan(weekStart) {
    const { data } = await sb.from("platoon_shift_plan").select("*").eq("week_start", weekStart);
    return data || [];
  }
  async function setPlatoonShift(platoonId, weekStart, shift) {
    const { data: existing } = await sb.from("platoon_shift_plan").select("*").eq("platoon_id", platoonId).eq("week_start", weekStart).maybeSingle();
    if (existing) await sb.from("platoon_shift_plan").update({ shift: shift || null }).eq("id", existing.id);
    else await sb.from("platoon_shift_plan").insert({ platoon_id: platoonId, week_start: weekStart, shift: shift || null });
  }

  async function getBaseLocation() {
    const { data } = await sb.from("settings").select("*").eq("key", "base_location").maybeSingle();
    return data ? data.value : null;
  }
  async function setBaseLocation(loc) {
    const { data: existing } = await sb.from("settings").select("*").eq("key", "base_location").maybeSingle();
    if (existing) await sb.from("settings").update({ value: loc }).eq("id", existing.id);
    else await sb.from("settings").insert({ key: "base_location", value: loc });
  }

  async function getEmergencyBroadcast() {
    const { data } = await sb.from("settings").select("*").eq("key", "emergency_broadcast").maybeSingle();
    return data ? data.value : null;
  }
  async function setEmergencyBroadcast(message) {
    const value = { message, sent_at: new Date().toISOString() };
    const { data: existing } = await sb.from("settings").select("*").eq("key", "emergency_broadcast").maybeSingle();
    if (existing) await sb.from("settings").update({ value }).eq("id", existing.id);
    else await sb.from("settings").insert({ key: "emergency_broadcast", value });
    return value;
  }
  async function clearEmergencyBroadcast() {
    await sb.from("settings").delete().eq("key", "emergency_broadcast");
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  async function savePushSubscription(memberId, sub) {
    const subJson = sub.toJSON();
    const { error } = await sb.rpc("save_push_subscription", {
      p_member_id: memberId,
      p_endpoint: sub.endpoint,
      p_subscription: subJson,
    });
    if (error) throw error;
  }

  async function initPushSilent(memberId) {
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
    await savePushSubscription(memberId, sub);
  }

  async function enablePushNotifications(memberId, btn, statusEl) {
    if (!("serviceWorker" in navigator) || !("PushManager" in window) || typeof Notification === "undefined") {
      statusEl.style.color = "#D64545";
      statusEl.textContent = "المتصفح ما بيدعم الإشعارات على هالجهاز.";
      return;
    }
    btn.disabled = true; btn.textContent = "...";
    try {
      const perm = await Notification.requestPermission();
      if (perm !== "granted") {
        statusEl.style.color = "#D64545";
        statusEl.textContent = "لازم توافق على إذن الإشعارات حتى توصلك رسائل الطوارئ.";
        btn.disabled = false; btn.textContent = "🔔 فعّل إشعارات الطوارئ";
        return;
      }
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
      await savePushSubscription(memberId, sub);
      statusEl.style.color = "#2FAE60";
      statusEl.textContent = "✔ الإشعارات مفعّلة على هالجهاز.";
      btn.parentElement.style.display = "none";
    } catch (e) {
      statusEl.style.color = "#D64545";
      const detail = (e && (e.message || e.details || e.hint)) || String(e);
      statusEl.textContent = "صار خطأ أثناء التفعيل: " + detail;
      btn.disabled = false; btn.textContent = "🔔 فعّل إشعارات الطوارئ";
    }
  }
  function haversineDistanceMeters(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const toRad = (d) => (d * Math.PI) / 180;
    const dLat = toRad(lat2 - lat1);
    const dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  const dayShortAr = (iso) => ["أحد","إثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"][new Date(iso+"T00:00:00").getDay()];
  function getSundayWeekStart(dateISO) {
    const d = new Date(dateISO + "T00:00:00");
    d.setDate(d.getDate() - d.getDay());
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  async function exportWeeklyExcelReport(weekStartISO) {
    const weekEndISO = addDays(weekStartISO, 6);
    const records = await loadAttendanceRange(weekStartISO, weekEndISO);
    const byDateMember = {};
    records.forEach(r => { (byDateMember[r.date] ||= {})[r.member_id] = r.status; });

    const days = Array.from({length:7}, (_, i) => addDays(weekStartISO, i));
    const header = ["الاسم", "السرية", "الفصيلة", "المجموعة", ...days.map(d => `${dayShortAr(d)} ${d.slice(5)}`), "أيام الحضور", "أيام الغياب", "نسبة الحضور %"];

    const rows = MEMBERS.map(m => {
      const unit = UNITS.find(u => u.id === m.unit_id);
      const squad = SQUADS.find(s => s.id === m.squad_id);
      const platoon = squad ? PLATOONS.find(p => p.id === squad.platoon_id) : null;
      let presentCount = 0, absentCount = 0;
      const dayCells = days.map(d => {
        const st = byDateMember[d]?.[m.id];
        if (st === "present") { presentCount++; return "حاضر"; }
        if (st === "absent") { absentCount++; return "غايب"; }
        if (st && REQUEST_TYPES.includes(st)) return STATUS[st].label;
        return "—";
      });
      const pct = Math.round((presentCount/7)*100);
      return [m.name, unit?.name||"", platoon?.name||"", squad?.name||"", ...dayCells, presentCount, absentCount, pct];
    });

    const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
    ws["!cols"] = [{wch:20},{wch:12},{wch:14},{wch:14}, ...days.map(()=>({wch:10})), {wch:12},{wch:12},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "التقرير الأسبوعي");
    XLSX.writeFile(wb, `تقرير-الحضور-${weekStartISO}.xlsx`);
  }

  async function printTodayDutyRoster() {
    const dateISO = todayISO();
    const records = await loadAttendance(dateISO);
    const recByMember = {};
    records.forEach(r => recByMember[r.member_id] = r);
    const onDutyUnitId = getOnDutyUnitId(UNITS, ROTATION, dateISO);
    const onDutyUnit = UNITS.find(u => u.id === onDutyUnitId) || UNITS[0];
    const weekStart = getWeekStart(dateISO, ROTATION);
    const planRows = await loadShiftPlan(weekStart);
    const onDutyPlatoons = PLATOONS.filter(p => p.unit_id === onDutyUnitId);

    function membersOfPlatoon(platoonId) {
      const squadIds = SQUADS.filter(s => s.platoon_id === platoonId).map(s => s.id);
      return MEMBERS.filter(m => squadIds.includes(m.squad_id));
    }

    const shiftSections = SHIFTS.map(shift => {
      const platoonIds = planRows.filter(r => r.shift === shift.id && onDutyPlatoons.some(p => p.id === r.platoon_id)).map(r => r.platoon_id);
      const platoonNames = platoonIds.map(pid => onDutyPlatoons.find(p => p.id === pid)?.name).filter(Boolean);
      const mems = platoonIds.flatMap(pid => membersOfPlatoon(pid));
      return { shift, platoonNames, members: mems };
    });

    const coveredIds = new Set(shiftSections.flatMap(s => s.members.map(m => m.id)));
    const allUnitMembers = MEMBERS.filter(m => m.unit_id === onDutyUnitId);
    const leftover = allUnitMembers.filter(m => !coveredIds.has(m.id));

    const rowsHtml = (mems) => mems.length === 0
      ? `<tr><td colspan="5" style="text-align:center;color:#888;padding:10px">لا يوجد أفراد</td></tr>`
      : mems.map((m, i) => {
          const rec = recByMember[m.id];
          const squad = SQUADS.find(s => s.id === m.squad_id);
          const statusLabel = rec ? (STATUS[rec.status]?.label || rec.status) : "لم يُحدد بعد";
          return `<tr>
            <td>${i + 1}</td>
            <td>${escapeHtml(m.name)}</td>
            <td>${escapeHtml(squad?.name || "—")}</td>
            <td>${escapeHtml(statusLabel)}</td>
            <td>${escapeHtml(rec?.time_in || "—")}</td>
          </tr>`;
        }).join("");

    const sectionsHtml = shiftSections.map(sec => `
      <div class="section">
        <div class="secHead">
          <span>${escapeHtml(sec.shift.label)} (${escapeHtml(sec.shift.range)})</span>
          <span class="secPlatoons">${sec.platoonNames.length ? "الفصيلة: " + sec.platoonNames.map(escapeHtml).join("، ") : "بدون فصيلة معيّنة"}</span>
        </div>
        <table>
          <thead><tr><th>#</th><th>الاسم</th><th>المجموعة</th><th>الحالة</th><th>وقت الدخول</th></tr></thead>
          <tbody>${rowsHtml(sec.members)}</tbody>
        </table>
      </div>
    `).join("");

    const leftoverHtml = leftover.length ? `
      <div class="section">
        <div class="secHead"><span>أفراد غير مغطّين بأي نوبة اليوم</span></div>
        <table>
          <thead><tr><th>#</th><th>الاسم</th></tr></thead>

  // ---------- Duty ----------
  async function loadAttendance(dateISO) {
    const { data } = await sb.from("attendance").select("*").eq("date", dateISO);
    return data || [];
  }
  async function loadAttendanceRange(startISO, endISO) {
    const { data } = await sb.from("attendance").select("*").gte("date", startISO).lte("date", endISO);
    return data || [];
  }
  async function upsertAttendance(memberId, dateISO, patch) {
    const { data: existing } = await sb.from("attendance").select("*").eq("member_id", memberId).eq("date", dateISO).maybeSingle();
    if (existing) {
      await sb.from("attendance").update({ ...patch, updated_at: new Date().toISOString() }).eq("id", existing.id);
    } else {
      await sb.from("attendance").insert({ member_id: memberId, date: dateISO, ...patch });
    }
  }

  function renderMemberRow(member, rec, shift, now, isToday) {
    const status = rec?.status;
    let progressHtml = "";
    if (status === "present" && rec?.time_in && isToday) {
      const [h,m] = rec.time_in.split(":").map(Number);
      const start = new Date(now); start.setHours(h,m,0,0);
      const elapsed = now - start; const total = 8*3600*1000;
      const pct = Math.max(0, Math.min(1, elapsed/total));
      const done = elapsed >= total;
      const doneAt = new Date(start.getTime()+total);
      progressHtml = `
        <div style="margin-top:6px">
          <div style="height:6px;background:#1E2B41;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${pct*100}%;background:${done?'#2FAE60':shift.color}"></div>
          </div>
          <div style="font-size:11px;color:${done?'#2FAE60':'#8A97A8'};margin-top:3px">
            ${done ? "أنهى النوبة ✅ (٨ ساعات)" : `قيد النوبة — تنتهي حوالي ${pad(doneAt.getHours())}:${pad(doneAt.getMinutes())}`}
          </div>
        </div>`;
    }
    let geoHtml = "";
    if (status === "present" && rec?.geo) {
      const g = rec.geo;
      let rangeHtml = "";
      if (typeof g.in_range === "boolean") {
        rangeHtml = g.in_range
          ? `<div style="font-size:11px;color:#2FAE60;margin-top:2px">✔ داخل نطاق القاعدة</div>`
          : `<div style="font-size:11px;color:#D64545;margin-top:2px">⚠️ خارج نطاق القاعدة (تقريبًا <span class="mono">${g.distance_m}</span> م)</div>`;
      }
      geoHtml = `<a class="geoLink" href="https://www.google.com/maps?q=${g.lat},${g.lng}" target="_blank">📍 موقع الحضور على الخريطة (دقة ~${g.accuracy} م)</a>${rangeHtml}`;

        geo.distance_m = Math.round(dist);
        geo.in_range = dist <= BASE_LOCATION.radius;
      }
      const now = new Date();
      const hh = pad(now.getHours()), mm = pad(now.getMinutes());
      await upsertAttendance(memberId, currentDate, { status:"present", verified:true, geo, time_in: hh+":"+mm });

  function openBaseLocationPicker() {
    const overlay = document.createElement("div");
    overlay.id = "mapModalOverlay";
    overlay.style.cssText = "position:fixed;inset:0;background:#000000cc;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px";
    overlay.innerHTML = `
      <div style="background:#141F2E;border:1px solid #1E2B41;border-radius:14px;padding:16px;max-width:480px;width:100%">
        <div style="font-weight:800;margin-bottom:8px">📍 حدد موقع القاعدة</div>
        <div style="font-size:12px;color:#8A97A8;margin-bottom:8px">دوس عالخريطة لتحديد نقطة القاعدة، أو استخدم موقعك الحالي إذا واقف فيها</div>
        <div id="pickerMap" style="height:280px;border-radius:10px;overflow:hidden;margin-bottom:10px"></div>
        <button class="smallBtn" id="useMyLocBtn" style="margin-bottom:10px">📌 استخدم موقعي الحالي</button>
        <div style="font-size:12px;margin-bottom:6px">نصف قطر القبول: <b id="radiusVal">${BASE_LOCATION?.radius || 150}</b> متر</div>
        <input type="range" id="radiusSlider" min="20" max="1000" step="10" value="${BASE_LOCATION?.radius || 150}" style="width:100%;margin-bottom:12px" />
        <div style="display:flex;gap:8px">
          <button id="saveBaseLocBtn" style="flex:1">حفظ</button>
          <button class="ghost" id="cancelBaseLocBtn" style="flex:1">إلغاء</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    const startLat = BASE_LOCATION?.lat ?? 33.8886;
    const startLng = BASE_LOCATION?.lng ?? 35.4955;
    const map = L.map("pickerMap").setView([startLat, startLng], BASE_LOCATION ? 16 : 8);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "© OpenStreetMap" }).addTo(map);

    let marker = null, circle = null;
    let picked = BASE_LOCATION ? { lat: startLat, lng: startLng } : null;

    function placeMarker(lat, lng) {
      picked = { lat, lng };
      const radius = +document.getElementById("radiusSlider").value;
      if (marker) marker.setLatLng([lat, lng]); else marker = L.marker([lat, lng]).addTo(map);
      if (circle) circle.setLatLng([lat, lng]).setRadius(radius); else circle = L.circle([lat, lng], { radius, color: "#D89A2E" }).addTo(map);
    }
    if (picked) placeMarker(picked.lat, picked.lng);

    map.on("click", (e) => placeMarker(e.latlng.lat, e.latlng.lng));

    document.getElementById("radiusSlider").oninput = (e) => {
      document.getElementById("radiusVal").textContent = e.target.value;
      if (circle) circle.setRadius(+e.target.value);
    };

    document.getElementById("useMyLocBtn").onclick = async () => {
      const geo = await getGeo();
      if (geo) { map.setView([geo.lat, geo.lng], 17); placeMarker(geo.lat, geo.lng); }
    };

    document.getElementById("cancelBaseLocBtn").onclick = () => overlay.remove();
    document.getElementById("saveBaseLocBtn").onclick = async () => {
      if (!picked) { alert("دوس عالخريطة أول لتحديد نقطة"); return; }
      const radius = +document.getElementById("radiusSlider").value;
      await setBaseLocation({ lat: picked.lat, lng: picked.lng, radius });
      BASE_LOCATION = await getBaseLocation();
      overlay.remove();
      renderDuty();
    };
  }

  function getGeo() {
    return new Promise((resolve) => {
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat:+pos.coords.latitude.toFixed(5), lng:+pos.coords.longitude.toFixed(5), accuracy:Math.round(pos.coords.accuracy) }),
        () => resolve(null),
        { enableHighAccuracy:true, timeout:15000, maximumAge:0 }
      );
    });
  }

  function isNowWithinShift(shiftId) {
    const s = SHIFTS.find(x => x.id === shiftId);
    if (!s) return null;
    const start = new Date(`${todayISO()}T${pad(s.start)}:00:00`);
    const end = new Date(start.getTime() + 8 * 3600 * 1000);
    const now = new Date();
    if (now < start) return "before";
    if (now >= end) return "after";
    return "within";
  }

  async function checkEmergencyBroadcast(row) {
    if (!row.on_duty) return;
    try {

      if (!data || !data.message || !data.sent_at) return;
      const seenKey = "emergencySeen_" + data.sent_at;
      if (localStorage.getItem(seenKey)) return;
      const box = document.getElementById("emergencyBannerBox");
      if (!box) return;
      box.innerHTML = `
        <div style="background:#3D1518;border:1px solid #D64545;border-radius:10px;padding:12px;margin:0 0 12px">

          <div style="font-size:13.5px;color:#F1D4D4;line-height:1.7;margin-bottom:10px">${escapeHtml(data.message)}</div>
          <button id="emergencyDismissBtn" style="width:100%;background:#D64545;border-color:#D64545">فهمت ✔</button>
        </div>
      `;

      const errEl = document.getElementById("swapErr");
      if (!chosenPartnerId) { errEl.textContent = "اختر الفرد يلي بدك تبدّل معه من نتائج البحث"; return; }
      if (!date) { errEl.textContent = "اختر التاريخ"; return; }
      errEl.textContent = "";
      const btn = document.getElementById("swapSubmitBtn");
      btn.disabled = true; btn.textContent = "...";
      const { error } = await sb.rpc("submit_swap_request", { p_member_id: row.member_id, p_pin: pin, p_partner_id: chosenPartnerId, p_date: date, p_note: note || null });
      btn.disabled = false; btn.textContent = "إرسال طلب التبديل";
      if (error) { errEl.textContent = "صار خطأ، جرب مرة ثانية."; return; }
      chosenPartnerId = null;
      document.getElementById("swapPartnerChosen").style.display = "none";
      document.getElementById("swapNote").value = "";
      document.getElementById("swapFormBox").style.display = "none";
      loadMySwaps();
    };

    document.getElementById("reqSubmitBtn").onclick = async () => {
      const type = document.getElementById("reqType").value;
      const date = document.getElementById("reqDate").value;
      const note = document.getElementById("reqNote").value.trim();
      const errEl = document.getElementById("reqErr");
      if (!date) { errEl.textContent = "اختر التاريخ"; return; }
      errEl.textContent = "";
      const btn = document.getElementById("reqSubmitBtn");
      btn.disabled = true; btn.textContent = "...";
      const { error } = await sb.rpc("submit_leave_request", { p_member_id: row.member_id, p_pin: pin, p_type: type, p_date: date, p_note: note || null });
      btn.disabled = false; btn.textContent = "إرسال الطلب";
      if (error) { errEl.textContent = "صار خطأ، جرب مرة ثانية."; return; }
      document.getElementById("reqNote").value = "";
      document.getElementById("reqFormBox").style.display = "none";
      loadMyRequests();
    };

    const confirmBtn = document.getElementById("ciConfirmBtn");
    if (confirmBtn) confirmBtn.onclick = async () => {
      confirmBtn.disabled = true; confirmBtn.textContent = "...جارِ تحديد الموقع";
      const geo = await getGeo();
      if (!geo) {
        confirmBtn.disabled = false; confirmBtn.textContent = "📍 تأكيد الحضور الآن";
        document.getElementById("ciConfirmErr").textContent = "لازم تسمح بالوصول للموقع لتأكيد الحضور.";
        return;
      }
      const { data: resultGeo, error } = await sb.rpc("member_checkin", {
        p_member_id: row.member_id, p_pin: pin, p_lat: geo.lat, p_lng: geo.lng, p_accuracy: geo.accuracy
      });
      if (error) {
        confirmBtn.disabled = false; confirmBtn.textContent = "📍 تأكيد الحضور الآن";
        document.getElementById("ciConfirmErr").textContent = "صار خطأ، جرب مرة ثانية.";
        return;
      }
      row.today_status = "present";
      row.today_time_in = new Date().toTimeString().slice(0,5);
      row.today_in_range = resultGeo?.in_range;
      row.today_distance_m = resultGeo?.distance_m;
      renderCheckinInfo(row, pin);
    };

    document.getElementById("ciBackBtn").onclick = () => { clearCreds(); renderCheckinChoice(); };
    wirePwaInstallButton();
  }

  let deferredInstallPrompt = null;
  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const btn = document.getElementById("pwaInstallBtn");
    if (btn) btn.style.display = "block";
  });
  function wirePwaInstallButton() {
    const btn = document.getElementById("pwaInstallBtn");
    if (!btn) return;
    if (deferredInstallPrompt) btn.style.display = "block";
    btn.onclick = async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      btn.style.display = "none";
    };
  }
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
  }

  (async () => {
    if (checkinMode) { await renderCheckinEntry(); return; }
    const { data: { session } } = await sb.auth.getSession();
    if (session) await bootApp();
    else renderLogin();
  })();

</script>
</body>
</html>
